<!-- @startingPoint section="App" subtitle="منصة تلخيص workspace — editor + library shell" viewport="1320x860" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>منصة تلخيص</title>
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html, body { height: 100%; margin: 0; }
  #app { height: 100vh; }
</style>
</head>
<body>
<div id="app"></div>
<script type="text/babel" src="icons.jsx" data-presets="react"></script>
<script type="text/babel" src="AppShell.jsx" data-presets="react"></script>
<script type="text/babel" src="EditorScreen.jsx" data-presets="react"></script>
<script type="text/babel" src="LibraryScreen.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
function Placeholder({ title }) {
  const { Card } = window.DesignSystem_4df9a0;
  return (
    <div style={{ padding: "40px", display: "flex", justifyContent: "center" }}>
      <Card elevation="sm" style={{ maxWidth: "440px", textAlign: "center", padding: "40px" }}>
        <div style={{ width: "52px", height: "52px", borderRadius: "var(--radius-lg)", margin: "0 auto 16px",
          background: "var(--surface-brand-subtle)", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon name="layout-template" size={24} color="var(--navy-600)" />
        </div>
        <h2 style={{ fontSize: "var(--fs-h4)", color: "var(--text-strong)", marginBottom: "8px" }}>{title}</h2>
        <p style={{ fontSize: "var(--fs-sm)", color: "var(--text-muted)" }}>هذه الشاشة جزء من نظام التصميم — المحتوى توضيحي.</p>
      </Card>
    </div>
  );
}

function App() {
  const [active, setActive] = React.useState("editor");
  return (
    <AppShell active={active} onNavigate={setActive}>
      {active === "editor" && <EditorScreen />}
      {active === "library" && <LibraryScreen />}
      {active === "templates" && <Placeholder title="القوالب" />}
      {active === "settings" && <Placeholder title="الإعدادات" />}
    </AppShell>
  );
}
ReactDOM.createRoot(document.getElementById("app")).render(<App />);
</script>
</body>
</html>
