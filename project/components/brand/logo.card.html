<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

<style>
  body{margin:0;padding:20px;background:var(--surface-card);}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .panel{border-radius:var(--radius-lg);padding:24px;display:flex;align-items:center;gap:24px;border:1px solid var(--border-subtle);}

<body>
<div id="root"></div>
<script type="text/babel">
const { Logo } = window.DesignSystem_4df9a0;
function Demo(){
  return (
    <div className="grid">
      <div className="panel" style={{background:"var(--surface-card)"}}>
        <Logo variant="full" size={30} />
      </div>
      <div className="panel" style={{background:"var(--navy-800)",borderColor:"var(--navy-700)"}}>

      <div className="panel" style={{justifyContent:"space-around"}}>

      </div>
      <div className="panel" style={{background:"var(--surface-accent-subtle)",borderColor:"var(--teal-100)"}}>
        <span className="lbl">الكحلي + الفيروزي فقط · لا تُعد تلوين الشعار</span>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
