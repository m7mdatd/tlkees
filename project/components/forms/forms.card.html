<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;padding:22px;background:var(--surface-card);} .grid{display:grid;grid-template-columns:1fr 1fr;gap:22px 28px;align-items:start;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Textarea, Select, Checkbox, Radio, Switch } = window.DesignSystem_4df9a0;
function Demo() {
  return (
    <div className="grid">
      <Input label="عنوان المخاطبة" placeholder="مثال: تعميم إداري رقم ٤٥" hint="اختياري" />
      <Select label="أسلوب الصياغة" options={["رسمي","موجز","تفصيلي"]} />
      <div style={{gridColumn:"1 / -1"}}>
        <Textarea label="النص الأصلي" rows={3} showCount maxLength={5000}
          defaultValue="تحية طيبة وبعد، نفيدكم بأنه تقرر عقد الاجتماع الدوري…" />
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
        <Checkbox label="إظهار النقاط الرئيسية" defaultChecked />
        <Checkbox label="ترجمة الملخّص" />
        <Switch label="الحفاظ على النبرة الرسمية" defaultChecked />
      </div>
      <Radio name="len" options={["قصير","متوسط","طويل"]} defaultValue="متوسط" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
