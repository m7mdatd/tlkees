<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Calm rounding — pill only for chips & avatars" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--surface-card);display:flex;gap:18px;flex-wrap:wrap;}
  .item{text-align:center;}
  .box{width:80px;height:64px;background:var(--navy-50);border:1.5px solid var(--navy-300);}
  .m{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);margin-top:6px;}
</style></head>
<body>
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="m">xs · 4</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="m">sm · 6</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="m">md · 10 ●</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="m">lg · 14</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="m">xl · 20</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="m">2xl · 28</div></div>
  <div class="item"><div class="box" style="width:64px;border-radius:var(--radius-pill)"></div><div class="m">pill · 999</div></div>
</body></html>
