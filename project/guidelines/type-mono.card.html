<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--surface-card);}
  .chip{display:inline-flex;gap:8px;align-items:center;font-family:var(--font-mono);font-size:14px;color:var(--navy-800);background:var(--gray-50);border:1px solid var(--border-subtle);padding:8px 12px;border-radius:var(--radius-sm);margin-left:8px;}
  .meta{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);margin-top:14px;}
</style></head>
<body>
  <span class="chip">420 / 5000</span>
  <span class="chip">12:45 ص</span>
  <span class="chip">v2.1.0</span>
  <span class="chip">٨٪ اختصار</span>
  <div class="meta">font-mono · IBM Plex Mono · 400 / 500 / 600 — used for counters, versions & timestamps</div>
</body></html>
