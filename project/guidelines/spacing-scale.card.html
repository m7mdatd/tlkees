<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid · --space-1 → --space-12" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--surface-card);}
  .row{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;}
  .item{text-align:center;}
  .bar{background:var(--teal-400);border-radius:3px 3px 0 0;}
  .m{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);margin-top:4px;}
</style></head>
<body>
<div class="row" id="r"></div>
<script>
const s=[["1",4],["2",8],["3",12],["4",16],["5",20],["6",24],["7",32],["8",40],["9",48],["10",64],["11",80],["12",96]];
document.getElementById("r").innerHTML=s.map(([k,v])=>`<div class="item"><div class="bar" style="width:18px;height:${v}px"></div><div class="m">${k}</div><div class="m">${v}</div></div>`).join("");
</script>
</body></html>
