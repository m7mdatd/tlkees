<!-- @dsCard group="Colors" viewport="700x140" name="Status colors" subtitle="Success, warning, danger, info" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--surface-card);}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .pair{display:flex;flex-direction:column;gap:6px;}
  .bar{height:44px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;}
  .soft{height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--text-muted);}
</style></head>
<body>
<div class="grid">
  <div class="pair"><div class="bar" style="background:var(--success-500)">نجاح</div><div class="soft" style="background:var(--success-100);color:var(--success-600)">success-100</div><div class="lbl">#1E9E6A</div></div>
  <div class="pair"><div class="bar" style="background:var(--warning-500)">تنبيه</div><div class="soft" style="background:var(--warning-100);color:var(--warning-600)">warning-100</div><div class="lbl">#D98A1F</div></div>
  <div class="pair"><div class="bar" style="background:var(--danger-500)">خطأ</div><div class="soft" style="background:var(--danger-100);color:var(--danger-600)">danger-100</div><div class="lbl">#D64545</div></div>
  <div class="pair"><div class="bar" style="background:var(--info-500)">معلومة</div><div class="soft" style="background:var(--info-100);color:var(--teal-700)">info-100</div><div class="lbl">= teal-500</div></div>
</div>
</body></html>
