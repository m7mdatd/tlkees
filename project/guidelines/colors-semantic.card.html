<!-- @dsCard group="Colors" viewport="700x160" name="Semantic surfaces & text" subtitle="Aliases used in components — reference these, not the raw scale" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px;background:var(--surface-page);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  .demo{border-radius:var(--radius-md);padding:14px;border:1px solid var(--border-subtle);}
  .t{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);margin-bottom:8px;}
</style></head>
<body>
<div class="grid">
  <div class="demo" style="background:var(--surface-card)">
    <div class="t">--surface-card</div>
    <div style="color:var(--text-strong);font-weight:700;font-size:15px">نص قوي · text-strong</div>
    <div style="color:var(--text-body);font-size:13px">نص أساسي · text-body</div>
    <div style="color:var(--text-muted);font-size:13px">نص خافت · text-muted</div>
  </div>
  <div class="demo" style="background:var(--surface-brand-subtle)">
    <div class="t">--surface-brand-subtle</div>
    <div style="color:var(--navy-800);font-weight:600">خلفية كحلية فاتحة</div>
    <div style="color:var(--text-link);font-size:13px;margin-top:6px">رابط · text-link</div>
  </div>
  <div class="demo" style="background:var(--surface-accent-subtle)">
    <div class="t">--surface-accent-subtle</div>
    <div style="color:var(--text-accent);font-weight:600">لون التمييز · text-accent</div>
    <div style="margin-top:8px;height:8px;border-radius:99px;background:var(--brand-accent)"></div>
  </div>
</div>
</body></html>
