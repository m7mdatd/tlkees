<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Navy-tinted soft shadows — paper on a cool desk" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px;background:var(--surface-page);display:flex;gap:22px;flex-wrap:wrap;align-items:center;}
  .item{text-align:center;}
  .box{width:96px;height:64px;background:var(--surface-card);border-radius:var(--radius-md);}
  .m{font-family:var(--font-mono);font-size:10px;color:var(--text-subtle);margin-top:8px;}
</style></head>
<body>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="m">xs</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="m">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="m">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="m">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="m">xl</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-accent)"></div><div class="m">accent</div></div>
</body></html>
